name: Hunter daily → Outbound CRM

# Discovers up to 10 local businesses via Google Places and POSTs them to the
# Hunter webhook on your Vercel Outbound CRM. Schedule aligns with “once per day”.
#
# Secrets (repo Settings → Secrets → Actions):
#   GOOGLE_PLACES_API_KEY      — Maps Platform key with Places API enabled
#   OUTBOUND_CRM_WEBHOOK_URL   — full URL …/api/webhooks/hunter
#   HUNTER_WEBHOOK_SECRET      — same bearer secret as Vercel Production
#
# OpenClaw “real” Hunter on Mac Mini can supersede this job by POSTing the same
# payloads on its own cron; see apps/outbound-crm/docs/HUNTER_SCHEDULE.md

on:
  schedule:
    # 14:15 UTC ≈ 07:15 MST (no DST); adjust for your timezone
    - cron: "15 14 * * *"
  workflow_dispatch:
    inputs:
      max_leads:
        description: "Max leads to post this run"
        required: false
        default: "10"

permissions:
  contents: read

jobs:
  discover-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Hunter → CRM sync
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          OUTBOUND_CRM_WEBHOOK_URL: ${{ secrets.OUTBOUND_CRM_WEBHOOK_URL }}
          HUNTER_WEBHOOK_SECRET: ${{ secrets.HUNTER_WEBHOOK_SECRET }}
          MAX_LEADS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_leads || '10' }}
        run: node scripts/hunter-daily-crm-sync.mjs
