# .github/workflows/report-to-prana.yml — paste into every component repo.
#
# Runs nightly. Reads .prana/component.yaml for this component's id and
# cadence, gathers state, and opens a [status] Issue on the trunk
# (sentientsprite/NEMO-APP-v.1). The trunk's aggregator workflow
# rolls those into STATUS.md and closes them.
#
# Required secret in this repo: PRANA_TRUNK_TOKEN
#   = a fine-grained PAT with `Issues: read+write` on
#     sentientsprite/NEMO-APP-v.1 (and nothing else).

name: Report status to Prana trunk

on:
  schedule:
    - cron: '0 7 * * *'    # 07:00 UTC ≈ midnight Mountain
  workflow_dispatch:
  workflow_run:
    workflows: ["CI", "test", "build"]
    types: [completed]

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install --no-save js-yaml

      - name: Compose status report
        id: compose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const yaml = require('js-yaml');

          const manifest = yaml.load(fs.readFileSync('.prana/component.yaml', 'utf8'));
          const id = manifest.id;
          if (!id) {
            console.error('Missing id in .prana/component.yaml');
            process.exit(1);
          }

          // ----- Gather metrics -----
          // Each component customizes this block. Defaults below cover
          // a generic build/test repo. Replace as needed.
          const metrics = {};
          try {
            // Example: parse last test run output, count files, etc.
            metrics.commits_24h = parseInt(
              require('child_process').execSync(
                'git log --since=1.day --oneline | wc -l', { encoding: 'utf8' }
              ).trim()
            );
          } catch (e) {}

          // ----- Roll up to a state -----
          // Components override this. Default: green if no errors, else red.
          let state = 'green';
          let summary = `${id} reported on time. ${metrics.commits_24h ?? 0} commits in last 24h.`;

          // ----- Window -----
          const now = new Date();
          const windowEnd = now.toISOString();
          const windowStart = new Date(now.getTime() - 24 * 3600 * 1000).toISOString();

          const date = now.toISOString().split('T')[0];
          const title = `[status] ${id} — ${date}`;
          const body = [
            '### Component ID',
            id,
            '',
            '### State',
            state,
            '',
            '### Summary',
            summary,
            '',
            '### Metrics (JSON)',
            '```json',
            JSON.stringify(metrics, null, 2),
            '```',
            '',
            '### Links',
            `- [This run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`,
            '',
            '### Notes',
            '(auto-generated by report-to-prana.yml)',
            '',
            '### Reporting window start (ISO 8601)',
            windowStart,
            '',
            '### Reporting window end (ISO 8601)',
            windowEnd,
          ].join('\n');

          fs.writeFileSync('/tmp/title', title);
          fs.writeFileSync('/tmp/body', body);
          EOF
          echo "title<<__EOT__" >> $GITHUB_OUTPUT
          cat /tmp/title >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "__EOT__" >> $GITHUB_OUTPUT
          echo "body<<__EOT__" >> $GITHUB_OUTPUT
          cat /tmp/body >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "__EOT__" >> $GITHUB_OUTPUT

      - name: Open issue on trunk
        env:
          GH_TOKEN: ${{ secrets.PRANA_TRUNK_TOKEN }}
        run: |
          set -euo pipefail
          gh issue create \
            --repo sentientsprite/NEMO-APP-v.1 \
            --title "${{ steps.compose.outputs.title }}" \
            --body "${{ steps.compose.outputs.body }}" \
            --label component-status

# =============================================================================
