# See TRUNK_LOOP_SETUP.md in NEMO-APP-v.1 for PAT + first-run steps.

name: Report status to Prana trunk

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC (~ midnight Mountain)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install --no-save js-yaml

      - name: Open status issue on trunk
        uses: actions/github-script@v7
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules
        with:
          github-token: ${{ secrets.PRANA_TRUNK_TOKEN }}
          script: |
            const fs = require("fs");
            const yaml = require("js-yaml");
            const { execSync } = require("child_process");

            const manifest = yaml.load(fs.readFileSync(".prana/component.yaml", "utf8"));
            const id = manifest.id;
            if (!id) throw new Error("Missing id in .prana/component.yaml");

            const metrics = {};
            try {
              metrics.commits_24h = parseInt(
                execSync("git log --since=1.day --oneline | wc -l", { encoding: "utf8" }).trim(),
                10
              );
            } catch (e) {
              metrics.commits_24h = 0;
            }

            let state = "green";
            let summary = `${id} reported on time. ${metrics.commits_24h} commits in last 24h.`;

            const now = new Date();
            const windowStart = new Date(now.getTime() - 24 * 3600 * 1000).toISOString();
            const windowEnd = now.toISOString();
            const date = now.toISOString().split("T")[0];
            const title = `[status] ${id} — ${date}`;
            const body = [
              "### Component ID",
              id,
              "",
              "### State",
              state,
              "",
              "### Summary",
              summary,
              "",
              "### Metrics (JSON)",
              "```json",
              JSON.stringify(metrics, null, 2),
              "```",
              "",
              "### Links",
              `- [This run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`,
              "",
              "### Notes",
              "(auto-generated by report-to-prana.yml)",
              "",
              "### Reporting window start (ISO 8601)",
              windowStart,
              "",
              "### Reporting window end (ISO 8601)",
              windowEnd,
            ].join("\n");

            await github.rest.issues.create({
              owner: "sentientsprite",
              repo: "NEMO-APP-v.1",
              title,
              body,
              labels: ["component-status"],
            });

